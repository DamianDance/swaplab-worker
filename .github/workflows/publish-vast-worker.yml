name: Publish Vast Worker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - remote/gpu_worker.py
      - remote/vast.Dockerfile
      - .dockerignore
      - .github/workflows/publish-vast-worker.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/swaplab-worker" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: remote/vast.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:facefusion
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
